name: Deploy Pages

# 任意向 master 推送 dist/ 的变更（本地 npm run release 或 daily.yml 定时提交）都会触发本流程，
# 将 dist/ 作为 GitHub Pages 产物部署上线。
on:
  push:
    branches: [master]
    paths:
      - 'dist/**'
  workflow_dispatch: {}

# 允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，新推送排队而非取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
