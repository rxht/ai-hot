<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI HOT 日报归档</title>
<script>
/* 首屏前先读取 localStorage，若存在主题类型则立即应用，避免主题闪烁 */
(function(){try{var t=localStorage.getItem('aihot-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
</script>
<style>
:root{
  --bg1:#eef2ff; --bg2:#fce7f3; --bg3:#e0f2fe; --bg4:#ede9fe;
  --glass:rgba(255,255,255,0.55);
  --glass-strong:rgba(255,255,255,0.72);
  --border:rgba(255,255,255,0.65);
  --text:#1f2430; --dim:#5b6472; --faint:#8a93a3;
  --accent:#6366f1; --accent2:#8b5cf6;
  --chip:rgba(99,102,241,0.12); --chip-text:#4f46e5;
  --shadow:0 12px 40px rgba(31,38,80,0.16);
  --radius:22px;
}
/* 未手动设置时自动跟随系统偏好 */
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg1:#0b1020; --bg2:#1a1033; --bg3:#06283a; --bg4:#0f172a;
    --glass:rgba(28,32,48,0.45);
    --glass-strong:rgba(30,35,54,0.62);
    --border:rgba(255,255,255,0.12);
    --text:#e8ebf2; --dim:#a4adbf; --faint:#6b7488;
    --accent:#818cf8; --accent2:#a78bfa;
    --chip:rgba(129,140,248,0.18); --chip-text:#c7ccff;
    --shadow:0 14px 44px rgba(0,0,0,0.45);
  }
}
html[data-theme="dark"]{
  --bg1:#0b1020; --bg2:#1a1033; --bg3:#06283a; --bg4:#0f172a;
  --glass:rgba(28,32,48,0.45);
  --glass-strong:rgba(30,35,54,0.62);
  --border:rgba(255,255,255,0.12);
  --text:#e8ebf2; --dim:#a4adbf; --faint:#6b7488;
  --accent:#818cf8; --accent2:#a78bfa;
  --chip:rgba(129,140,248,0.18); --chip-text:#c7ccff;
  --shadow:0 14px 44px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text); min-height:100vh; line-height:1.55; position:relative; overflow-x:hidden;
  background:linear-gradient(135deg,var(--bg1),var(--bg2) 40%,var(--bg3) 75%,var(--bg4));
  transition:background .6s ease,color .4s ease;
}
.blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.55;z-index:0;pointer-events:none;animation:float 18s ease-in-out infinite}
.blob.b1{width:46vw;height:46vw;left:-12vw;top:-10vw;background:radial-gradient(circle,#8b5cf6,transparent 70%)}
.blob.b2{width:40vw;height:40vw;right:-10vw;top:8vw;background:radial-gradient(circle,#22d3ee,transparent 70%);animation-delay:-6s}
.blob.b3{width:38vw;height:38vw;left:20vw;bottom:-16vw;background:radial-gradient(circle,#f472b6,transparent 70%);animation-delay:-11s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3vw,-3vh) scale(1.08)}}
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius)}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:22px 20px 60px}

/* Hero */
.hero{padding:30px 32px;margin-bottom:18px;position:relative;overflow:hidden}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.hero-eyebrow{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
.hero-date{font-size:30px;font-weight:800;margin-top:4px;letter-spacing:.5px}
.hero-week{font-size:15px;color:var(--dim);font-weight:600}
.hero-lead{margin-top:12px;color:var(--dim);font-size:14px;max-width:720px}
.notice{margin-bottom:18px;padding:13px 18px;color:var(--accent2);font-size:13.5px;font-weight:600;border-left:4px solid var(--accent2)}
.hero-right{display:flex;align-items:center;gap:14px}
.total-box{text-align:center;padding:6px 18px}
.total-num{font-size:42px;font-weight:800;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.total-label{font-size:12px;color:var(--dim);margin-top:4px;letter-spacing:.05em}
.theme-btn{cursor:pointer;border:1px solid var(--border);background:var(--glass-strong);color:var(--text);width:46px;height:46px;border-radius:14px;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .2s,background .3s}
.theme-btn:hover{transform:translateY(-2px)}
/* 悬浮切换按钮，所有页面共用，避免与 Hero 内按钮重复 */
.theme-fab{position:fixed;right:18px;bottom:18px;z-index:60;box-shadow:var(--shadow)}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.stat{display:flex;align-items:center;gap:9px;padding:9px 15px;border-radius:14px;background:var(--glass-strong);border:1px solid var(--border)}
.stat .ico{font-size:18px}
.stat .lab{font-size:13px;color:var(--dim);font-weight:600}
.stat .cnt{font-size:15px;font-weight:800;color:var(--text)}
.gen-note{margin-top:16px;font-size:12.5px;color:var(--faint)}

/* 锚点导航 */
.anchor-nav{position:sticky;top:12px;z-index:20;display:flex;gap:6px;padding:9px 10px;margin-bottom:18px;overflow-x:auto}
.anchor-nav a{white-space:nowrap;text-decoration:none;color:var(--dim);font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:12px;transition:all .25s;border:1px solid transparent}
.anchor-nav a:hover{color:var(--text);background:var(--glass-strong)}
.anchor-nav a.active{color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent2));border-color:transparent;box-shadow:0 6px 18px rgba(99,102,241,.35)}

/* 布局 */
.layout{display:grid;grid-template-columns:212px 1fr;gap:22px;align-items:start}
.sidebar{position:sticky;top:78px;padding:18px 16px}
.sidebar h4{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.side-link{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--dim);font-size:14px;font-weight:600;padding:9px 12px;border-radius:12px;transition:all .2s;margin-bottom:4px}
.side-link:hover{color:var(--text);background:var(--glass-strong)}
.side-link .ico{font-size:16px}
.side-link .n{margin-left:auto;font-size:12px;color:var(--faint);background:var(--chip);padding:1px 8px;border-radius:8px}
.side-arc{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.side-arc a{display:block;text-decoration:none;color:var(--accent);font-size:13px;font-weight:700;padding:9px 12px;border-radius:12px;background:var(--chip)}
.side-arc a:hover{background:var(--glass-strong)}

/* 版块 */
.block{padding:22px 24px;margin-bottom:18px;scroll-margin-top:84px}
.block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.block-head h2{font-size:19px;font-weight:800;display:flex;align-items:center;gap:10px}
.block-head .ico{font-size:20px}
.block-head .cnt{font-size:13px;font-weight:700;color:var(--accent);background:var(--chip);padding:3px 12px;border-radius:10px}
.empty{color:var(--faint);font-size:14px;padding:8px 2px}

/* 卡片网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{padding:16px 17px;border-radius:18px;background:var(--glass-strong);border:1px solid var(--border);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(31,38,80,.22);border-color:var(--accent)}
.card:hover::before{opacity:1}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-top .chips{display:flex;gap:6px;align-items:center;min-width:0}
.chip-time{color:var(--faint)}
.num{font-size:13px;font-weight:800;color:var(--accent);background:var(--chip);min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px}
.chip{font-size:11.5px;font-weight:700;color:var(--chip-text);background:var(--chip);padding:3px 10px;border-radius:9px;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-title{font-size:15px;font-weight:700;line-height:1.45}
.card-title a{color:var(--text);text-decoration:none;transition:color .2s}
.card-title a:hover{color:var(--accent)}
.card-sum{font-size:13px;color:var(--dim);line-height:1.5}

/* 页脚 */
.footer{margin-top:8px;padding:22px 26px;text-align:center;color:var(--dim);font-size:13px}
.footer .big{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}

/* 归档页 */
.arc-hero{padding:28px 30px;margin-bottom:18px}
.arc-hero h1{font-size:26px;font-weight:800}
.arc-hero p{color:var(--dim);font-size:14px;margin-top:6px}
.search{margin:16px 0 8px;display:flex;gap:10px}
.search input{flex:1;padding:12px 16px;border-radius:14px;border:1px solid var(--border);background:var(--glass-strong);color:var(--text);font-size:14px;outline:none}
.search input:focus{border-color:var(--accent)}
.arc-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.arc-item a{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:var(--text);padding:15px 18px;border-radius:16px;background:var(--glass-strong);border:1px solid var(--border);transition:transform .2s,border-color .2s}
.arc-item a:hover{transform:translateY(-3px);border-color:var(--accent)}
.arc-date{font-weight:800;font-size:15px}
.arc-count{font-size:12px;color:var(--accent);background:var(--chip);padding:3px 10px;border-radius:9px;font-weight:700}
.arc-empty{color:var(--faint);padding:20px;text-align:center}

@media (max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .hero-date{font-size:25px}
  .total-num{font-size:34px}
}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="wrap">

  <header class="arc-hero glass">
    <h1>🗂️ AI HOT 日报归档</h1>
    <p>共 1 期 · 历史累计 18 条 · 按日期检索往期晨报</p>
    <div class="search"><input id="arcSearch" type="text" placeholder="输入日期检索，例如 2026-07-18 或 07-18" autocomplete="off"></div>
  </header>
  <ul class="arc-list" id="arcList"><li class="arc-item"><a href="2026-07-18.html" rel="noopener noreferrer"><span class="arc-date">2026-07-18</span><span class="arc-count">18 条</span></a></li></ul>
  <script>
  (function(){
    var inp=document.getElementById('arcSearch');
    var list=document.getElementById('arcList');
    if(!inp||!list)return;
    inp.addEventListener('input',function(){
      var q=inp.value.trim();
      var items=list.querySelectorAll('.arc-item');
      var vis=0;
      items.forEach(function(it){
        var t=it.textContent||'';
        var ok=!q||t.indexOf(q)>=0;
        it.style.display=ok?'':'none';
        if(ok)vis++;
      });
      var empty=document.getElementById('arcEmpty');
      if(vis===0&&!empty){empty=document.createElement('p');empty.id='arcEmpty';empty.className='arc-empty';empty.textContent='没有匹配的日报';list.parentNode.insertBefore(empty,list.nextSibling);}
      else if(vis>0&&empty){empty.remove();}
    });
  })();
  </script>
</div>
<button class="theme-btn theme-fab" id="themeToggle" title="切换浅色 / 深色">🌙</button>
<script>
(function(){
  var root=document.documentElement;
  var KEY='aihot-theme';
  var btn=document.getElementById('themeToggle');
  function sysDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;}
  function apply(t){if(t)root.setAttribute('data-theme',t);else root.removeAttribute('data-theme');}
  function icon(t){if(btn)btn.textContent=(t==='dark')?'☀️':'🌙';}
  var saved=localStorage.getItem(KEY);
  apply(saved);
  icon(saved||(sysDark()?'dark':'light'));
  if(btn){btn.addEventListener('click',function(){
    var cur=root.getAttribute('data-theme');
    var next=cur?(cur==='dark'?'light':'dark'):(sysDark()?'light':'dark');
    apply(next);localStorage.setItem(KEY,next);icon(next);
  });}
  if(saved!=='light'&&saved!=='dark'){
    var mq=window.matchMedia('(prefers-color-scheme: dark)');
    var onCh=function(e){if(!localStorage.getItem(KEY))icon(e.matches?'dark':'light');};
    if(mq.addEventListener)mq.addEventListener('change',onCh);
  }
  var links=Array.prototype.slice.call(document.querySelectorAll('[data-nav]'));
  var map={};links.forEach(function(l){map[l.getAttribute('href').slice(1)]=l;});
  var secs=Array.prototype.slice.call(document.querySelectorAll('section[data-spy]'));
  if('IntersectionObserver' in window&&secs.length){
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){if(e.isIntersecting){links.forEach(function(l){l.classList.remove('active');});var l=map[e.target.id];if(l)l.classList.add('active');}});
    },{rootMargin:'-45% 0px -50% 0px',threshold:0});
    secs.forEach(function(s){io.observe(s);});
  }
  if(btn){var eff=root.getAttribute('data-theme');btn.textContent=((eff==='dark')||(!eff&&sysDark()))?'☀️':'🌙';}
})();
</script>

</body>
</html>
